name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r weather-flask-app/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 weather-flask-app/ --config=.flake8

      - name: Run tests with pytest
        run: |
          cd weather-flask-app && pytest tests/ -v
